{% extends "inspection/base.html" %}
{% block content %}

{% load static %}

<div id="image-s0-container" class="grid-item-config">
    <h1 class=config-title_text>Top</h1>
    <div class="grid-item">
        <div class=config-input_text>
            <form method="POST" action="{% url 'inspection:sensor_config' 0 %}"> 
                {% csrf_token %}
                {{ form_change_sensor_0.as_p }}
                <input type="submit" class="config-button" name="form_type" value="Change Sensor Parameters">
            </form>        
        </div>
    </div>
</div>

<div id="image-s1-container" class="grid-item-config">
    <h1 class=config-title_text>Bottom</h1>
    <a href={{ui.gocator_0_url}} target="_blank">
        <div class="grid-item">
            <input id="gocator-0-button"  class="config-button" type="button"  value="Gocator HMI">
        </div>
    </a>
</div>

<div id="image-s2-container" class="grid-item-config">
    <h1 class=config-title_text>Side Left</h1>
    <a href={{ui.gocator_1_url}} target="_blank">
        <div class="grid-item">
            <input id="gocator-1-button"  class="config-button" type="button"  value="Gocator HMI">
        </div>
    </a>
</div>

<div id="image-s3-container" class="grid-item-config">
    <h1 class=config-title_text>Side Right</h1>
    <a href={{ui.gocator_2_url}} target="_blank">
        <div class="grid-item">
            <input id="gocator-2-button"  class="config-button" type="button"  value="Gocator HMI">
        </div>
    </a>
</div>

{% endblock %}
